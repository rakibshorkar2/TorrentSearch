name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.29.2'

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (cached)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        id: cache-pub
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get ${{ steps.cache-pub.outputs.cache-hit == 'true' && '--offline' || '' }}

      - name: Build C++ native engine
        run: |
          cd native
          cmake -S torrent_engine -B build/ios \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DIOS=ON
          cmake --build build/ios --config Release
          cp build/ios/Release-iphoneos/libtorrent_engine.a ../ios/Runner/

      - name: Patch Xcode project with native sources
        run: ruby native/patch_xcode.rb

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          zip -r ../TorrentFlow.ipa Payload/
          cd ..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TorrentFlow-unsigned-ipa
          path: build/TorrentFlow.ipa
          if-no-files-found: error

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | sed 's/+.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION+build.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TorrentFlow ${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## TorrentFlow ${{ steps.version.outputs.version }}
            
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ### Changes
            ${{ github.event.head_commit.message }}
            
            ### Native Engine
            - C++ torrent engine: SHA-1 verification, bencode parsing, magnet URI parsing, piece management
            - Swift native service: background downloads, local notifications, Keychain, network monitoring
            - Optimized for iPhone 15 Pro (arm64)
            
            ### Notes
            - Unsigned IPA for sideloading
            - Sign with your own Apple developer certificate before installing
          files: build/TorrentFlow.ipa
          generate_release_notes: false
          draft: false
          prerelease: false
