name: torrentflow
description: "A premium iOS download manager with BitTorrent support and Seedr cloud integration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  percent_indicator: ^4.2.4
  ffi: ^2.1.3
  html: ^0.15.5
  xml: ^6.5.0
  collection: ^1.19.1
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1
  wakelock_plus: ^1.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter_launcher_icons:
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: false
